<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經典俄羅斯方塊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    boxShadow: {
                        'neon-blue': '0 0 25px rgba(6, 182, 212, 0.5)',
                        'neon-pink': '0 0 25px rgba(236, 72, 153, 0.5)',
                        'container': '0 25px 50px -12px rgba(0, 0, 0, 0.8)',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-slate-950 via-purple-950 to-slate-950 min-h-screen flex flex-col justify-center items-center text-white font-sans antialiased selection:bg-cyan-500">

    <div class="bg-slate-900/80 p-6 md:p-8 rounded-2xl shadow-container backdrop-blur-xl border border-white/10 max-w-md w-full relative">
        
        <h1 class="text-4xl md:text-5xl font-black text-center mb-6 tracking-widest bg-gradient-to-r from-cyan-400 via-pink-500 to-yellow-400 bg-clip-text text-transparent drop-shadow-[0_0_15px_rgba(6,182,212,0.5)]">
            TETRIS
        </h1>
        
        <div class="flex gap-6 justify-center items-start">
            <div class="relative">
                <canvas id="tetris" width="240" height="480" class="border-4 border-slate-700 bg-black rounded-lg shadow-neon-blue"></canvas>
                
                <div id="pause-screen" class="hidden absolute inset-0 bg-black/70 flex flex-col justify-center items-center rounded-lg backdrop-blur-sm">
                    <h2 class="text-3xl font-black text-yellow-400 tracking-wider mb-2 animate-pulse">PAUSED</h2>
                    <p class="text-xs text-slate-400">按 <span class="bg-slate-800 px-1.5 py-0.5 rounded border border-slate-600 text-white font-mono">P</span> 鍵繼續遊戲</p>
                </div>
            </div>
            
            <div class="flex flex-col gap-4 w-28">
                <div class="bg-slate-800/50 border border-white/10 rounded-xl p-3 flex flex-col items-center">
                    <h3 class="text-xs font-bold text-cyan-400 tracking-wider mb-2 uppercase">Next</h3>
                    <canvas id="next" width="96" height="96" class="bg-black border-2 border-slate-700 rounded-md shadow-neon-pink"></canvas>
                </div>
                
                <div class="bg-slate-800/50 border border-white/10 rounded-xl p-3 text-center">
                    <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-1">Score</p>
                    <span id="score" class="text-2xl font-black text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.4)]">0</span>
                </div>

                <div class="bg-slate-800/50 border border-white/10 rounded-xl p-3 text-center border-yellow-500/30">
                    <p class="text-xs text-yellow-500 font-medium uppercase tracking-wider mb-1">🔥 High</p>
                    <span id="high-score" class="text-2xl font-black text-amber-400 drop-shadow-[0_0_8px_rgba(245,158,11,0.4)]">0</span>
                </div>
                
                <div class="bg-slate-800/50 border border-white/10 rounded-xl p-3 text-center">
                    <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-1">Level</p>
                    <span id="level" class="text-2xl font-black text-green-400 drop-shadow-[0_0_8px_rgba(74,222,128,0.4)]">1</span>
                </div>
            </div>
        </div>

        <div class="mt-6 pt-4 border-t border-white/5 text-center text-xs text-slate-400 space-y-2">
            <p class="flex justify-center gap-2 items-center">
                <span class="bg-slate-800 px-1.5 py-0.5 rounded border border-slate-600 text-white">⬅️</span>
                <span class="bg-slate-800 px-1.5 py-0.5 rounded border border-slate-600 text-white">➡️</span> 移動 
                <span class="bg-slate-800 px-1.5 py-0.5 rounded border border-slate-600 text-white">⬆️</span> 旋轉
                <span class="bg-slate-800 px-1.5 py-0.5 rounded border border-slate-600 text-white">⬇️</span> 加速
            </p>
            <p class="text-[11px] text-slate-500 flex justify-center gap-3">
                <span><span class="bg-slate-800 px-1.5 py-0.5 rounded border border-slate-600 text-white font-mono">Space</span> 瞬間下落</span>
                <span><span class="bg-slate-800 px-1.5 py-0.5 rounded border border-slate-600 text-white font-mono">P</span> 暫停 / 開始</span>
            </p>
        </div>
    </div>

    <div id="gameover-modal" class="hidden opacity-0 fixed inset-0 bg-black/80 backdrop-blur-md flex justify-center items-center z-50 transition-opacity duration-300">
        <div id="gameover-box" class="scale-95 bg-slate-900 border-2 border-pink-500 p-8 rounded-2xl shadow-[0_0_50px_rgba(236,72,153,0.3)] max-w-xs w-full text-center transition-transform duration-300">
            <h2 class="text-4xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-red-500 mb-4 animate-bounce">
                GAME OVER
            </h2>
            
            <div class="space-y-3 my-6 bg-slate-950/50 p-4 rounded-xl border border-white/5">
                <p class="text-sm text-slate-400">最終得分：<span id="modal-score" class="text-xl font-bold text-yellow-400">0</span></p>
                <p class="text-sm text-yellow-500">最高紀錄：<span id="modal-high-score" class="text-xl font-bold text-amber-400">0</span></p>
                <p class="text-sm text-slate-400">達到等級：<span id="modal-level" class="text-xl font-bold text-green-400">1</span></p>
            </div>
            
            <button onclick="closeGameOverModal()" class="w-full py-3 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold rounded-xl shadow-lg shadow-cyan-500/20 active:scale-95 transition-all uppercase tracking-widest text-sm border border-cyan-400/30">
                再玩一局 🎮
            </button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
