<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貓貓命運決策搖獎機 ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 min-h-screen text-white font-sans antialiased kawaii-grid relative flex flex-col justify-between items-center selection:bg-rose-500/30">

    <div class="absolute top-1/4 left-1/3 w-96 h-96 bg-rose-500/10 rounded-full blur-[130px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-cyan-500/10 rounded-full blur-[130px] pointer-events-none"></div>

    <header class="w-full border-b border-rose-500/20 bg-slate-950/60 backdrop-blur-md px-4 md:px-8 py-3.5 flex justify-between items-center z-10">
        <div class="flex items-center gap-2.5">
            <span class="text-xl">🐾</span>
            <span class="text-base md:text-lg font-black tracking-widest bg-gradient-to-r from-rose-400 to-pink-500 bg-clip-text text-transparent font-mono">
                NEKO_DESTINY_v5.1
            </span>
        </div>
        <div id="neko-slogan" class="text-xs text-slate-400 font-medium tracking-wide hidden md:block"></div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 py-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch justify-center z-10">
        
        <section class="w-full lg:col-span-5 bg-slate-900/40 border border-white/5 backdrop-blur-xl rounded-3xl p-5 shadow-cute-card flex flex-col gap-4">
            
            <div onclick="toggleControlPanel()" class="flex justify-between items-center cursor-pointer border-b border-white/5 pb-3 group">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-rose-500"></span>
                    <h2 class="font-black text-sm tracking-widest text-slate-300 font-mono group-hover:text-rose-400 transition-colors">
                        🐾 命運決策矩陣設定
                    </h2>
                </div>
                <div class="flex items-center gap-1 text-slate-500 lg:hidden">
                    <span class="text-xs">展開/收合</span>
                    <span id="fold-arrow" class="text-xs transition-transform duration-300 inline-block">▶</span>
                </div>
            </div>

            <div id="control-content" class="hidden lg:flex flex-col gap-5">
                
                <div class="flex flex-col gap-2">
                    <label class="text-[11px] font-black tracking-wider text-slate-400 font-mono">✏️ 單筆新增事件</label>
                    <div class="flex gap-2">
                        <input type="text" id="option-input" placeholder="輸入事件喵..." class="flex-1 bg-slate-950 border border-white/10 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-rose-500/50 transition-colors placeholder:text-slate-600">
                        <button onclick="addOption()" class="px-4 py-2 bg-slate-800 border border-white/10 rounded-xl text-sm font-bold hover:bg-slate-700 active:scale-95 transition-all">新增</button>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-[11px] font-black tracking-wider text-slate-400 font-mono">⚡ 批量注入資料（支援逗號或換行分開）</label>
                    <textarea id="batch-input" rows="3" placeholder="例如：火鍋, 拉麵, 炸雞 (支援複製貼上)" class="w-full bg-slate-950 border border-white/10 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-rose-500/50 transition-colors placeholder:text-slate-600 resize-none font-mono text-xs"></textarea>
                    <button onclick="addBatchOptions()" class="w-full py-2 bg-gradient-to-r from-rose-500/20 to-pink-500/20 border border-rose-500/30 text-rose-300 rounded-xl text-xs font-bold hover:from-rose-500/30 hover:to-pink-500/30 transition-all active:scale-[0.99]">
                        ⚡ 批量注入矩陣資料
                    </button>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-[11px] font-black tracking-wider text-slate-400 font-mono">🔮 貓貓推薦主題池</label>
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
                        <button onclick="injectPreset('food')" class="py-2 bg-slate-950 border border-white/5 rounded-xl text-xs hover:border-cyan-500/40 hover:text-cyan-400 transition-all font-medium">🍲 吃什麼</button>
                        <button onclick="injectPreset('drink')" class="py-2 bg-slate-950 border border-white/5 rounded-xl text-xs hover:border-cyan-500/40 hover:text-cyan-400 transition-all font-medium">🧋 喝什麼</button>
                        <button onclick="injectPreset('dessert')" class="py-2 bg-slate-950 border border-white/5 rounded-xl text-xs hover:border-cyan-500/40 hover:text-cyan-400 transition-all font-medium">🍰 甜點控</button>
                        <button onclick="injectPreset('play')" class="py-2 bg-slate-950 border border-white/5 rounded-xl text-xs hover:border-cyan-500/40 hover:text-cyan-400 transition-all font-medium">🎮 做什麼</button>
                        <button onclick="injectPreset('where')" class="py-2 bg-slate-950 border border-white/5 rounded-xl text-xs hover:border-cyan-500/40 hover:text-cyan-400 transition-all font-medium">📍 去哪裡</button>
                        <button onclick="injectPreset('buy')" class="py-2 bg-slate-950 border border-white/5 rounded-xl text-xs hover:border-cyan-500/40 hover:text-cyan-400 transition-all font-medium">🛍️ 買什麼</button>
                        <button onclick="injectPreset('watch')" class="py-2 bg-slate-950 border border-white/5 rounded-xl text-xs hover:border-cyan-500/40 hover:text-cyan-400 transition-all font-medium">🎬 看什麼</button>
                        <button onclick="injectPreset('sport')" class="py-2 bg-slate-950 border border-white/5 rounded-xl text-xs hover:border-cyan-500/40 hover:text-cyan-400 transition-all font-medium">🏃 動起來</button>
                        <button onclick="injectPreset('music')" class="py-2 bg-slate-950 border border-white/5 rounded-xl text-xs hover:border-cyan-500/40 hover:text-cyan-400 transition-all font-medium">🎵 聽什麼</button>
                        <button onclick="injectPreset('study')" class="py-2 bg-slate-950 border border-white/5 rounded-xl text-xs hover:border-cyan-500/40 hover:text-cyan-400 transition-all font-medium">📚 充實自我</button>
                        <button onclick="injectPreset('work')" class="py-2 bg-slate-950 border border-white/5 rounded-xl text-xs hover:border-cyan-500/40 hover:text-cyan-400 transition-all font-medium">💼 工作</button>
                        <button onclick="injectPreset('relax')" class="py-2 bg-slate-950 border border-white/5 rounded-xl text-xs hover:border-cyan-500/40 hover:text-cyan-400 transition-all font-medium">🧘 放鬆</button>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-center">
                        <label class="text-[11px] font-black tracking-wider text-slate-400 font-mono">🥫 當前候選矩陣 (<span id="option-count">0</span>)</label>
                        <button onclick="clearAll()" class="text-[10px] font-bold text-rose-400/70 hover:text-rose-400 transition-colors">清空全部</button>
                    </div>
                    <div id="options-container" class="flex flex-wrap gap-1.5 max-h-[160px] overflow-y-auto bg-slate-950/60 p-3 rounded-xl border border-white/5 content-start"></div>
                </div>

            </div>
        </section>

        <section class="lg:col-span-7 flex flex-col gap-5 w-full">
            <div id="screen-container" class="bg-slate-900/20 border border-rose-500/40 shadow-neon-kawaii rounded-3xl p-6 md:p-8 flex flex-col items-center justify-center relative overflow-hidden scanlines min-h-[320px] md:min-h-[380px] transition-all duration-300">
                
                <pre id="neko-avatar" class="font-mono text-sm md:text-base text-rose-400 text-center leading-tight mb-3 select-none whitespace-pre h-14 flex items-center justify-center font-bold">
 /\_/\
( o.o )
 > ^ <
                </pre>

                <div id="neko-bubble" class="text-[11px] font-mono text-cyan-400 bg-cyan-950/30 border border-cyan-500/20 px-3 py-1 rounded-full mb-6 tracking-widest uppercase">
                    MEOW? WAIT_ORDER
                </div>

                <div id="display-screen" class="text-2xl md:text-5xl font-black tracking-widest text-cyan-400 font-mono py-6 drop-shadow-[0_0_12px_rgba(34,211,238,0.5)] text-center max-w-full break-words px-4">
                    喵準備就緒
                </div>

                <div id="decision-panel" class="hidden opacity-0 translate-y-2 mt-6 flex gap-4 transition-all duration-300 z-20 w-full max-w-xs">
                    <button onclick="handleDecision('keep')" class="flex-1 py-2.5 bg-gradient-to-r from-cyan-500 to-blue-600 border border-cyan-400/30 rounded-xl font-bold text-sm shadow-[0_0_15px_rgba(34,211,238,0.3)] hover:brightness-110 active:scale-95 transition-all">
                        💖 就選這個
                    </button>
                    <button onclick="handleDecision('ban')" class="flex-1 py-2.5 bg-gradient-to-r from-rose-500 to-pink-600 border border-rose-400/30 rounded-xl font-bold text-sm shadow-[0_0_15px_rgba(244,63,94,0.3)] hover:brightness-110 active:scale-95 transition-all">
                        💔 從池中踢除
                    </button>
                </div>

                <div class="absolute top-4 left-4 flex gap-1.5">
                    <span class="w-2.5 h-2.5 rounded-full bg-pink-500 animate-ping"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-cyan-400"></span>
                </div>
                <div class="absolute bottom-3 text-[9px] font-mono text-slate-600">
                    NEKO_DECISION_STREAM_V5.1_HYBRID
                </div>
            </div>

            <button id="btn-spin" onclick="startSpin()" class="w-full py-5 md:py-6 font-black tracking-widest text-xl md:text-2xl bg-gradient-to-r from-rose-500 via-pink-500 to-fuchsia-600 rounded-2xl shadow-neon-kawaii transition-all active:scale-[0.97] hover:scale-[1.01] hover:brightness-110 group relative overflow-hidden">
                <span class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></span>
                🐾 啟動貓貓命運矩陣 🐾
            </button>
        </section>
    </main>

    <footer class="w-full border-t border-white/5 bg-slate-950/40 backdrop-blur-md px-4 py-3 text-center text-[10px] font-mono text-slate-500 z-10 tracking-wider">
        ENVIRONMENT: DEPLOYED_ON_GITHUB_PAGES // ALL_RIGHTS_RESERVED_BY_NEKO
    </footer>

    <script src="script.js"></script>
</body>
</html>
